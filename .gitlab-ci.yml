stages:
  - format
  - lint
  - modernization
  - type_check
  - test
  - coverage
  - security
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.default_python: &default_python
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt

format:
  <<: *default_python
  stage: format
  script:
    - ruff format --check backend tests

lint:
  <<: *default_python
  stage: lint
  script:
    - ruff check backend tests
    - flake8 backend tests
    - pylint backend || true
    - vulture backend

pyupgrade:
  <<: *default_python
  stage: modernization
  script:
    - find backend tests -name "*.py" -print0 | xargs -0 pyupgrade --py310-plus --keep-runtime-typing

type_check:
  <<: *default_python
  stage: type_check
  script:
    - mypy backend

test:
  <<: *default_python
  stage: test
  script:
    - pytest -q

coverage:
  <<: *default_python
  stage: coverage
  script:
    - pytest --cov=backend --cov-report=xml --cov-report=html
  artifacts:
    paths:
      - coverage.xml
      - htmlcov/

security:
  <<: *default_python
  stage: security
  script:
    - bandit -r backend -ll
    - semgrep --config=auto --error --quiet backend
    - pip-audit
    - gitleaks detect --source . --no-git --exit-code 1

build:
  <<: *default_python
  stage: build
  script:
    - docker build -t resume-information-extractor:latest .
changelog:
  stage: lint
  script:
    - pip install git-cliff
    - git-cliff -o CHANGELOG.md
