stages:
  - lint
  - test

lint:
  stage: lint
  image: python:3.13
  before_script:
    - pip install ruff
  script:
    - ruff check backend
    - ruff format --check backend

test:
  stage: test
  image: python:3.13
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - python -m pytest backend/tests